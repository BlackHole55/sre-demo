---
- name: Deploy Online Boutique
  hosts: boutique
  gather_facts: no
  tasks:
    - name: Pull latest code
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dir }}"
        version: "{{ repo_branch }}"
        force: yes
      become: yes
    - name: Set repo ownership
      file:
        path: "{{ repo_dir }}"
        owner: ubuntu
        group: ubuntu
        recurse: yes
      become: yes
  roles:
    - role: ../roles/boutique
      repo_dir: "{{ playbook_dir }}/../.."
      app_images:
        - { name: "frontend", context: "frontend" }
        - { name: "productcatalogservice", context: "src/productcatalogservice" }
        - { name: "authservice", context: "src/authservice" }
        - { name: "checkoutservice", context: "src/checkoutservice" }
        - { name: "cartservice", context: "src/cartservice/src" }
      tags: [deploy]
