# ── Determine where we are ────────────────────────────────────────
- name: Set working directory
  set_fact:
    work_dir: "{{ lookup('env', 'GITHUB_WORKSPACE') | default(repo_dir, true) }}"
    running_in_ci: "{{ lookup('env', 'GITHUB_WORKSPACE') != '' }}"

# ================================================================
# PATCH MANIFESTS — runs locally in CI, remotely when manual
# ================================================================
- name: Fix storage class gp2 -> local-path
  shell: |
    find {{ work_dir }}/k8s -name "*.yaml" -exec \
      sed -i 's/storageClassName: gp2/storageClassName: local-path/g' {} \;
  delegate_to: "{{ 'localhost' if running_in_ci else inventory_hostname }}"
  become: "{{ false if running_in_ci else true }}"

- name: Fix storage class standard -> local-path
  shell: |
    find {{ work_dir }}/k8s -name "*.yaml" -exec \
      sed -i 's/storageClassName: standard/storageClassName: local-path/g' {} \;
  delegate_to: "{{ 'localhost' if running_in_ci else inventory_hostname }}"
  become: "{{ false if running_in_ci else true }}"

- name: Fix image references
  shell: |
    find {{ work_dir }}/k8s -name "*.yaml" -exec \
      sed -i 's|YOUR_ECR_REPO/|boutique/|g' {} \;
  delegate_to: "{{ 'localhost' if running_in_ci else inventory_hostname }}"
  become: "{{ false if running_in_ci else true }}"

- name: Set replicas to 1
  replace:
    path: "{{ work_dir }}/k8s/services/services.yaml"
    regexp: 'replicas: 2'
    replace: 'replicas: 1'
  delegate_to: "{{ 'localhost' if running_in_ci else inventory_hostname }}"
  become: "{{ false if running_in_ci else true }}"

- name: Remove headless clusterIP
  replace:
    path: "{{ work_dir }}/k8s/postgres/postgres.yaml"
    regexp: '  clusterIP: None'
    replace: ''
  delegate_to: "{{ 'localhost' if running_in_ci else inventory_hostname }}"
  become: "{{ false if running_in_ci else true }}"

- name: Add imagePullPolicy Never
  shell: |
    if ! grep -q "imagePullPolicy: Never" {{ work_dir }}/k8s/services/services.yaml; then
      sed -i '/image: boutique\//a\          imagePullPolicy: Never' \
        {{ work_dir }}/k8s/services/services.yaml
    fi
  delegate_to: "{{ 'localhost' if running_in_ci else inventory_hostname }}"
  become: "{{ false if running_in_ci else true }}"

# ================================================================
# BUILD IMAGES — always on EC2
# ================================================================
- name: Build Docker images
  community.docker.docker_image:
    name: "{{ item.name }}"
    tag: latest
    source: build
    build:
      path: "{{ repo_dir }}/{{ item.context | regex_replace(repo_dir + '/', '') }}"
      pull: no
    state: present
  loop: "{{ app_images }}"
  become: yes

- name: Import images into k3s
  shell: "docker save {{ item.name }}:latest | k3s ctr images import -"
  loop: "{{ app_images }}"
  become: yes
  changed_when: true

# ================================================================
# DEPLOY — always on EC2
# Copy patched manifests to EC2 if running in CI
# ================================================================
- name: Copy patched manifests to EC2 (CI only)
  synchronize:
    src: "{{ work_dir }}/k8s/"
    dest: "{{ repo_dir }}/k8s/"
    mode: push
  when: running_in_ci | bool

- name: Apply namespace
  command: kubectl apply -f {{ repo_dir }}/k8s/namespace/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply configmap and secrets
  command: kubectl apply -f {{ repo_dir }}/k8s/{{ item }}/
  loop:
    - configmap
    - secrets
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply postgres and redis
  command: kubectl apply -f {{ repo_dir }}/k8s/{{ item }}/
  loop:
    - postgres
    - redis
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for postgres
  command: kubectl rollout status statefulset/postgres -n boutique --timeout=90s
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for redis
  command: kubectl rollout status deployment/redis -n boutique --timeout=60s
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply application services
  command: kubectl apply -f {{ repo_dir }}/k8s/services/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply monitoring
  command: kubectl apply -f {{ repo_dir }}/k8s/monitoring/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for deployments
  command: kubectl rollout status deployment/{{ item }} -n boutique --timeout=120s
  loop:
    - frontend
    - productcatalogservice
    - checkoutservice
    - authservice
    - cartservice
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  ignore_errors: yes

- name: Get pod status
  command: kubectl get pods -n boutique
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: pod_status
  changed_when: false

- name: Show pod status
  debug:
    msg: "{{ pod_status.stdout_lines }}"