---
# roles/boutique/tasks/main.yml

# ── Determine working directory ───────────────────────────────────
# Uses GITHUB_WORKSPACE when running in CI, repo_dir when running manually
- name: Set working directory
  set_fact:
    work_dir: "{{ lookup('env', 'GITHUB_WORKSPACE') | default(repo_dir, true) }}"

- name: Show working directory
  debug:
    msg: "Working directory: {{ work_dir }}"

# ================================================================
# PATCH MANIFESTS FOR K3S
# ================================================================
- name: Fix storage class gp2 -> local-path
  shell: |
    find {{ work_dir }}/k8s -name "*.yaml" -exec \
      sed -i 's/storageClassName: gp2/storageClassName: local-path/g' {} \;
  become: yes

- name: Fix storage class standard -> local-path
  shell: |
    find {{ work_dir }}/k8s -name "*.yaml" -exec \
      sed -i 's/storageClassName: standard/storageClassName: local-path/g' {} \;
  become: yes

- name: Fix image references
  shell: |
    find {{ work_dir }}/k8s -name "*.yaml" -exec \
      sed -i 's|YOUR_ECR_REPO/|boutique/|g' {} \;
  become: yes

- name: Set replicas to 1 for single node
  replace:
    path: "{{ work_dir }}/k8s/services/services.yaml"
    regexp: 'replicas: 2'
    replace: 'replicas: 1'
  become: yes

- name: Remove headless clusterIP from postgres service
  replace:
    path: "{{ work_dir }}/k8s/postgres/postgres.yaml"
    regexp: '  clusterIP: None'
    replace: ''
  become: yes

- name: Add imagePullPolicy Never if not present
  shell: |
    if ! grep -q "imagePullPolicy: Never" {{ work_dir }}/k8s/services/services.yaml; then
      sed -i '/image: boutique\//a\          imagePullPolicy: Never' \
        {{ work_dir }}/k8s/services/services.yaml
    fi
  become: yes

# ================================================================
# BUILD IMAGES
# ================================================================
- name: Build Docker images
  community.docker.docker_image:
    name: "{{ item.name }}"
    tag: latest
    source: build
    build:
      path: "{{ item.context }}"
      pull: no
    state: present
  loop: "{{ app_images }}"
  become: yes

- name: Import images into k3s
  shell: "docker save {{ item.name }}:latest | k3s ctr images import -"
  loop: "{{ app_images }}"
  become: yes
  changed_when: true

# ================================================================
# DEPLOY
# ================================================================
- name: Apply namespace
  command: kubectl apply -f {{ work_dir }}/k8s/namespace/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply configmap and secrets
  command: kubectl apply -f {{ work_dir }}/k8s/{{ item }}/
  loop:
    - configmap
    - secrets
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply postgres and redis
  command: kubectl apply -f {{ work_dir }}/k8s/{{ item }}/
  loop:
    - postgres
    - redis
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for postgres to be ready
  command: kubectl rollout status statefulset/postgres -n boutique --timeout=90s
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for redis to be ready
  command: kubectl rollout status deployment/redis -n boutique --timeout=60s
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply application services
  command: kubectl apply -f {{ work_dir }}/k8s/services/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply monitoring
  command: kubectl apply -f {{ work_dir }}/k8s/monitoring/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for all deployments
  command: >
    kubectl rollout status deployment/{{ item }}
    -n boutique --timeout=120s
  loop:
    - frontend
    - productcatalogservice
    - checkoutservice
    - authservice
    - cartservice
    - prometheus
    - grafana
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  ignore_errors: yes

- name: Get pod status
  command: kubectl get pods -n boutique
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: pod_status
  changed_when: false

- name: Show pod status
  debug:
    msg: "{{ pod_status.stdout_lines }}"

- name: Get node IP
  command: >
    kubectl get nodes
    -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: node_ip
  changed_when: false

- name: Show access URLs
  debug:
    msg:
      - "App:        http://{{ node_ip.stdout }}:30080"
      - "Grafana:    http://{{ node_ip.stdout }}:30030"
      - "Prometheus: http://{{ node_ip.stdout }}:9090"