---
# roles/boutique/tasks/main.yml
# Build images and deploy boutique to k3s

- name: Patch k8s manifests for k3s
  block:
    - name: Fix storage class gp2 -> local-path
      replace:
        path: "{{ item }}"
        regexp: 'storageClassName: gp2'
        replace: 'storageClassName: local-path'
      with_fileglob:
        - "{{ repo_dir }}/k8s/**/*.yaml"

    - name: Fix storage class standard -> local-path
      replace:
        path: "{{ item }}"
        regexp: 'storageClassName: standard'
        replace: 'storageClassName: local-path'
      with_fileglob:
        - "{{ repo_dir }}/k8s/**/*.yaml"

    - name: Fix image references
      replace:
        path: "{{ item }}"
        regexp: 'YOUR_ECR_REPO/'
        replace: 'boutique/'
      with_fileglob:
        - "{{ repo_dir }}/k8s/**/*.yaml"

    - name: Set replicas to 1 for single node
      replace:
        path: "{{ repo_dir }}/k8s/services/services.yaml"
        regexp: 'replicas: 2'
        replace: 'replicas: 1'

    - name: Remove headless service clusterIP
      replace:
        path: "{{ repo_dir }}/k8s/postgres/postgres.yaml"
        regexp: '  clusterIP: None\n'
        replace: ''

- name: Build Docker images
  community.docker.docker_image:
    name: "{{ item.name }}"
    tag: latest
    source: build
    build:
      path: "{{ item.context }}"
      pull: no
    state: present
  loop: "{{ app_images }}"
  become: yes

- name: Import images into k3s
  shell: "docker save {{ item.name }}:latest | k3s ctr images import -"
  loop: "{{ app_images }}"
  become: yes
  changed_when: true

- name: Apply namespace
  command: kubectl apply -f {{ repo_dir }}/k8s/namespace/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply configmap and secrets
  command: kubectl apply -f {{ repo_dir }}/k8s/{{ item }}/
  loop:
    - configmap
    - secrets
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply postgres and redis
  command: kubectl apply -f {{ repo_dir }}/k8s/{{ item }}/
  loop:
    - postgres
    - redis
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for postgres to be ready
  command: kubectl rollout status statefulset/postgres -n boutique --timeout=90s
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for redis to be ready
  command: kubectl rollout status deployment/redis -n boutique --timeout=60s
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply application services
  command: kubectl apply -f {{ repo_dir }}/k8s/services/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply monitoring
  command: kubectl apply -f {{ repo_dir }}/k8s/monitoring/
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Wait for all deployments
  command: >
    kubectl rollout status deployment/{{ item }}
    -n boutique --timeout=120s
  loop:
    - frontend
    - productcatalogservice
    - checkoutservice
    - authservice
    - cartservice
    - prometheus
    - grafana
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  ignore_errors: yes

- name: Get pod status
  command: kubectl get pods -n boutique
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: pod_status
  changed_when: false

- name: Show pod status
  debug:
    msg: "{{ pod_status.stdout_lines }}"

- name: Get node IP
  command: >
    kubectl get nodes
    -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
  become: yes
  become_user: ubuntu
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: node_ip
  changed_when: false

- name: Show access URLs
  debug:
    msg:
      - "App:        http://{{ node_ip.stdout }}:30080"
      - "Grafana:    http://{{ node_ip.stdout }}:30030"
      - "Prometheus: http://{{ node_ip.stdout }}:9090"
