name: CI/CD — Build, Test and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/boutique

jobs:

  # ================================================================
  # JOB 1 — Validate configuration files
  # ================================================================
  validate:
    name: Validate configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate Kubernetes manifests
        run: |
          # install kubectl
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          # dry-run apply all manifests
          for dir in k8s/namespace k8s/configmap k8s/postgres k8s/redis k8s/services k8s/monitoring; do
            if [ -d "$dir" ]; then
              echo "Validating $dir..."
              kubectl apply --dry-run=client -f "$dir/" 2>/dev/null || true
            fi
          done

      - name: Validate Ansible playbooks
        run: |
          pip install ansible --quiet
          for playbook in ansible/playbooks/*.yml; do
            echo "Checking $playbook..."
            ansible-playbook --syntax-check \
              -i ansible/inventory/hosts.yml \
              "$playbook" || true
          done

      - name: Run pre-deploy checks
        run: |
          chmod +x scripts/pre-deploy-check.sh
          # run validation only (no --deploy flag)
          bash scripts/pre-deploy-check.sh || true
        env:
          POSTGRES_USER:     boutique
          POSTGRES_PASSWORD: boutique
          POSTGRES_DB:       boutique
          PRODUCTCATALOG_POSTGRES_DSN: "postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=products"
          CHECKOUT_POSTGRES_DSN:       "postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=orders"
          AUTH_POSTGRES_DSN:           "postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=auth"
          PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
          CHECKOUT_SERVICE_ADDR:        checkoutservice:5050
          CART_SERVICE_ADDR:            cartservice:7070
          AUTH_SERVICE_ADDR:            authservice:9555
          REDIS_ADDR:                   redis:6379
          GRAFANA_PASSWORD:             admin

  # ================================================================
  # JOB 2 — Build and test Go services
  # ================================================================
  test-go:
    name: Test Go services
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        service:
          - path: src/frontend
            name: frontend
          - path: src/productcatalogservice
            name: productcatalogservice
          - path: src/checkoutservice
            name: checkoutservice
          - path: src/authservice
            name: authservice

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: ${{ matrix.service.path }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.service.path }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.service.path }}
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        working-directory: ${{ matrix.service.path }}
        run: go vet ./...

  # ================================================================
  # JOB 3 — Build Docker images
  # ================================================================
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [validate, test-go]

    permissions:
      contents: read
      packages: write    # needed to push to GHCR

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=$SHA" >> $GITHUB_OUTPUT
          echo "Image tag: $SHA"

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: src/frontend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/frontend:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push productcatalogservice
        uses: docker/build-push-action@v5
        with:
          context: src/productcatalogservice
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/productcatalogservice:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}/productcatalogservice:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push checkoutservice
        uses: docker/build-push-action@v5
        with:
          context: src/checkoutservice
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/checkoutservice:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}/checkoutservice:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push authservice
        uses: docker/build-push-action@v5
        with:
          context: src/authservice
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/authservice:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}/authservice:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push cartservice
        uses: docker/build-push-action@v5
        with:
          context: src/cartservice/src
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/cartservice:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}/cartservice:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ================================================================
  # JOB 4 — Deploy via Ansible
  # ================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production    # requires manual approval in GitHub settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible
          ansible --version

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Update inventory with EC2 host
        run: |
          sed -i "s/YOUR_EC2_IP/${{ secrets.EC2_HOST }}/g" \
            ansible/inventory/hosts.yml

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook \
            -i ansible/inventory/hosts.yml \
            ansible/playbooks/deploy.yml \
            -e "image_tag=${{ needs.build.outputs.image-tag }}" \
            -e "repo_url=https://github.com/${{ github.repository }}.git" \
            -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} \
            "kubectl get pods -n boutique"

      - name: Post deployment status
        if: always()
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} \
            "kubectl get pods -n boutique --no-headers | awk '{print \$1, \$3, \$4}'"
