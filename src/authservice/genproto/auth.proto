syntax = "proto3";
package auth;
option go_package = "github.com/GoogleCloudPlatform/microservices-demo/src/authservice/genproto";

service AuthService {
    rpc Register        (RegisterRequest)        returns (RegisterResponse);
    rpc Login           (LoginRequest)           returns (LoginResponse);
    rpc ValidateSession (ValidateSessionRequest) returns (ValidateSessionResponse);
}

message RegisterRequest  { string email = 1; string password = 2; }
message RegisterResponse { string user_id = 1; }

message LoginRequest     { string email = 1; string password = 2; }
message LoginResponse    { string token = 1; string user_id = 2; }

message ValidateSessionRequest  { string token = 1; }
message ValidateSessionResponse { bool valid = 1; string user_id = 2; }