apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: boutique
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: boutique-config
                  key: POSTGRES_DB
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "boutique"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "boutique"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2   # AWS EKS default storage class
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: boutique
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless service for StatefulSet
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: boutique
data:
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS products;
    CREATE SCHEMA IF NOT EXISTS orders;
    CREATE SCHEMA IF NOT EXISTS auth;

    CREATE TABLE IF NOT EXISTS products.catalog (
      id                       TEXT PRIMARY KEY,
      name                     TEXT NOT NULL,
      description              TEXT NOT NULL DEFAULT '',
      picture                  TEXT NOT NULL DEFAULT '',
      price_usd_currency_code  TEXT NOT NULL DEFAULT 'USD',
      price_usd_units          BIGINT NOT NULL DEFAULT 0,
      price_usd_nanos          INT NOT NULL DEFAULT 0,
      categories               TEXT NOT NULL DEFAULT ''
    );

    INSERT INTO products.catalog VALUES
      ('OLJCESPC7Z','Sunglasses','Add a modern touch to your outfits.','/static/img/products/sunglasses.jpg','USD',19,990000000,'accessories'),
      ('66VCHSJNUP','Tank Top','Perfectly cropped cotton tank.','/static/img/products/tank-top.jpg','USD',18,990000000,'clothing,tops'),
      ('1YMWWN1N4O','Watch','Gold-tone stainless steel watch.','/static/img/products/watch.jpg','USD',109,990000000,'accessories')
    ON CONFLICT (id) DO NOTHING;

    CREATE TABLE IF NOT EXISTS orders.orders (
      id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id        TEXT NOT NULL,
      status         TEXT NOT NULL DEFAULT 'pending',
      total_currency TEXT NOT NULL DEFAULT 'USD',
      total_units    BIGINT NOT NULL DEFAULT 0,
      total_nanos    INT NOT NULL DEFAULT 0,
      created_at     TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS orders.order_items (
      id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      order_id     UUID NOT NULL REFERENCES orders.orders(id) ON DELETE CASCADE,
      product_id   TEXT NOT NULL,
      quantity     INT NOT NULL DEFAULT 1,
      unit_currency TEXT NOT NULL DEFAULT 'USD',
      unit_units   BIGINT NOT NULL DEFAULT 0,
      unit_nanos   INT NOT NULL DEFAULT 0
    );

    CREATE TABLE IF NOT EXISTS auth.sessions (
      token      TEXT PRIMARY KEY,
      user_id    TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      expires_at TIMESTAMPTZ NOT NULL DEFAULT now() + INTERVAL '24 hours'
    );

    CREATE TABLE IF NOT EXISTS auth.users (
      id            TEXT PRIMARY KEY,
      email         TEXT UNIQUE NOT NULL,
      password_hash TEXT NOT NULL,
      created_at    TIMESTAMPTZ NOT NULL DEFAULT now()
    );
