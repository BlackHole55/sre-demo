apiVersion: v1
kind: Secret
metadata:
  name: boutique-secrets
  namespace: boutique
type: Opaque
stringData:
  # ── PostgreSQL credentials ────────────────────────────────────
  POSTGRES_USER:     "boutique"
  POSTGRES_PASSWORD: "boutique"

  # ── DSNs ─────────────────────────────────────────────────────
  PRODUCTCATALOG_POSTGRES_DSN: "postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=products"
  CHECKOUT_POSTGRES_DSN:       "postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=orders"
  AUTH_POSTGRES_DSN:           "postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=auth"

  # ── Monitoring ────────────────────────────────────────────────
  GRAFANA_PASSWORD: "admin"
---
# NOTE: In production replace stringData with base64-encoded data
# or use AWS Secrets Manager with External Secrets Operator:
# https://external-secrets.io/
#
# kubectl create secret generic boutique-secrets \
#   --from-literal=POSTGRES_PASSWORD=yourpassword \
#   --namespace=boutique
