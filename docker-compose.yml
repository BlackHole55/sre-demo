version: "3.9"

services:

  # ── Gateway ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - boutique

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - CHECKOUT_SERVICE_ADDR=checkoutservice:5050
      - CART_SERVICE_ADDR=cartservice:7070
      - AUTH_SERVICE_ADDR=authservice:9555
      - CURRENCY_SERVICE_ADDR=
      - RECOMMENDATION_SERVICE_ADDR=
      - SHIPPING_SERVICE_ADDR=
      - ENABLE_PROFILER=0
    depends_on:
      - productcatalogservice
      - checkoutservice
      - authservice
      - cartservice
    networks:
      - boutique

  # ── Product Catalog ────────────────────────────────────────────
  productcatalogservice:
    build:
      context: ./src/productcatalogservice
      dockerfile: Dockerfile
    environment:
      - PORT=3550
      - POSTGRES_DSN=postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=products
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique

  # ── Order / Checkout ───────────────────────────────────────────
  checkoutservice:
    build:
      context: ./src/checkoutservice
      dockerfile: Dockerfile
    environment:
      - PORT=5050
      - PRODUCT_CATALOG_SERVICE_ADDR=productcatalogservice:3550
      - POSTGRES_DSN=postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=order
      # stub out services checkoutservice normally calls
      - CART_SERVICE_ADDR=cartservice:7070
      - CURRENCY_SERVICE_ADDR=
      - PAYMENT_SERVICE_ADDR=
      - SHIPPING_SERVICE_ADDR=
      - EMAIL_SERVICE_ADDR=
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique

  # ── Auth ────────────────────────────────
  authservice:
    build:
      context: ./src/authservice
      dockerfile: Dockerfile
    environment:
      - PORT=9555
      - POSTGRES_DSN=postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=auth
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique

  # ── Cart ────────────────────────────────
  cartservice:
    build:
      context: ./src/cartservice/src/
      dockerfile: Dockerfile
    environment:
      - PORT=7070
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - boutique

  redis:
    image: redis:7-alpine
    networks:
      - boutique

  # ── Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boutique
      POSTGRES_PASSWORD: boutique
      POSTGRES_DB: boutique
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"           # expose for local debugging only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boutique"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - boutique


    # ── Monitoring ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - boutique

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - boutique

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://boutique:boutique@postgres:5432/boutique?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boutique

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - boutique

networks:
  boutique:
    driver: bridge

volumes:
  pgdata:
  prometheusdata:
  grafanadata: 