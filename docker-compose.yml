services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - boutique

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    environment:
      - PORT=${PORT:-8080}
      - PRODUCT_CATALOG_SERVICE_ADDR=${PRODUCT_CATALOG_SERVICE_ADDR}
      - CHECKOUT_SERVICE_ADDR=${CHECKOUT_SERVICE_ADDR}
      - CART_SERVICE_ADDR=${CART_SERVICE_ADDR}
      - AUTH_SERVICE_ADDR=${AUTH_SERVICE_ADDR}
      - CURRENCY_SERVICE_ADDR=${CURRENCY_SERVICE_ADDR:-}
      - RECOMMENDATION_SERVICE_ADDR=${RECOMMENDATION_SERVICE_ADDR:-}
      - SHIPPING_SERVICE_ADDR=${SHIPPING_SERVICE_ADDR:-}
      - ENABLE_PROFILER=${ENABLE_PROFILER:-0}
      - ENV_PLATFORM=${ENV_PLATFORM:-local}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'
    depends_on:
      productcatalogservice:
        condition: service_healthy
      checkoutservice:
        condition: service_healthy
      authservice:
        condition: service_healthy
      cartservice:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - boutique

  productcatalogservice:
    build:
      context: ./src/productcatalogservice
      dockerfile: Dockerfile
    environment:
      - PORT=3550
      - POSTGRES_DSN=${PRODUCTCATALOG_POSTGRES_DSN}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 64m
          cpus: '0.1'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - boutique

  checkoutservice:
    build:
      context: ./src/checkoutservice
      dockerfile: Dockerfile
    environment:
      - PORT=5050
      - PRODUCT_CATALOG_SERVICE_ADDR=${PRODUCT_CATALOG_SERVICE_ADDR}
      - POSTGRES_DSN=${CHECKOUT_POSTGRES_DSN}
      - CART_SERVICE_ADDR=${CART_SERVICE_ADDR}
      - CURRENCY_SERVICE_ADDR=${CURRENCY_SERVICE_ADDR:-}
      - PAYMENT_SERVICE_ADDR=${PAYMENT_SERVICE_ADDR:-}
      - SHIPPING_SERVICE_ADDR=${SHIPPING_SERVICE_ADDR:-}
      - EMAIL_SERVICE_ADDR=${EMAIL_SERVICE_ADDR:-}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - boutique

  authservice:
    build:
      context: ./src/authservice
      dockerfile: Dockerfile
    environment:
      - PORT=9555
      - POSTGRES_DSN=${AUTH_POSTGRES_DSN}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 64m
          cpus: '0.1'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - boutique

  cartservice:
    build:
      context: ./src/cartservice/src/
      dockerfile: Dockerfile
    environment:
      - PORT=7070
      - REDIS_ADDR=${REDIS_ADDR}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - boutique

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - boutique

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boutique"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - boutique


  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - boutique

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - boutique

  loki:
    image: grafana/loki:2.9.0
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - boutique

  promtail:
    image: grafana/promtail:2.9.0
    user: root
    volumes:
      - ./monitoring/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - boutique

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - boutique

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      - REDIS_ADDR=redis://${REDIS_ADDR}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - boutique

networks:
  boutique:
    driver: bridge

volumes:
  pgdata:
  prometheusdata:
  grafanadata: 
  lokidata: