services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
    configs:
      - source: my_nginx_cfg
        target: /etc/nginx/conf.d/default.conf
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    # healthcheck:
    #   test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3
    networks:
      - boutique

  frontend:
    image: microservices-demo-frontend:latest
    environment:
      - PORT=${PORT:-8080}
      - PRODUCT_CATALOG_SERVICE_ADDR=${PRODUCT_CATALOG_SERVICE_ADDR:-productcatalogservice:3550}
      - CHECKOUT_SERVICE_ADDR=${CHECKOUT_SERVICE_ADDR:-checkoutservice:5050}
      - CART_SERVICE_ADDR=${CART_SERVICE_ADDR:-cartservice:7070}
      - AUTH_SERVICE_ADDR=${AUTH_SERVICE_ADDR:-authservice:9555}
      - CURRENCY_SERVICE_ADDR=${CURRENCY_SERVICE_ADDR:-}
      - RECOMMENDATION_SERVICE_ADDR=${RECOMMENDATION_SERVICE_ADDR:-}
      - SHIPPING_SERVICE_ADDR=${SHIPPING_SERVICE_ADDR:-}
      - ENABLE_PROFILER=${ENABLE_PROFILER:-0}
      - ENV_PLATFORM=${ENV_PLATFORM:-local}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - boutique

  productcatalogservice:
    image: microservices-demo-productcatalogservice:latest
    environment:
      - PORT=3550
      - POSTGRES_DSN=${PRODUCTCATALOG_POSTGRES_DSN}
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
    networks:
      - boutique

  checkoutservice:
    image: microservices-demo-checkoutservice:latest
    environment:
      - PORT=5050
      - PRODUCT_CATALOG_SERVICE_ADDR=${PRODUCT_CATALOG_SERVICE_ADDR:-productcatalogservice:3550}
      - POSTGRES_DSN=${CHECKOUT_POSTGRES_DSN:-postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=orders}
      - CART_SERVICE_ADDR=${CART_SERVICE_ADDR:-cartservice:7070}
      - CURRENCY_SERVICE_ADDR=${CURRENCY_SERVICE_ADDR:-}
      - PAYMENT_SERVICE_ADDR=${PAYMENT_SERVICE_ADDR:-}
      - SHIPPING_SERVICE_ADDR=${SHIPPING_SERVICE_ADDR:-}
      - EMAIL_SERVICE_ADDR=${EMAIL_SERVICE_ADDR:-}
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - boutique

  authservice:
    image: microservices-demo-authservice:latest
    environment:
      - PORT=9555
      - POSTGRES_DSN=${AUTH_POSTGRES_DSN:-postgres://boutique:boutique@postgres:5432/boutique?sslmode=disable&search_path=auth}
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - boutique

  cartservice:
    image: microservices-demo-cartservice:latest
    environment:
      - PORT=7070
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - boutique

  redis:
    image: redis:7-alpine
    deploy:
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boutique

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boutique}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boutique}
      POSTGRES_DB: ${POSTGRES_DB:-boutique}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    deploy:
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boutique"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - boutique


  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - boutique

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - boutique

  loki:
    image: grafana/loki:2.9.0
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - boutique

  promtail:
    image: grafana/promtail:2.9.0
    user: root
    volumes:
      - ./monitoring/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    deploy:
      mode: global
    networks:
      - boutique

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks:
      - boutique

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      - REDIS_ADDR=redis://${REDIS_ADDR:-redis:6379}
    networks:
      - boutique

networks:
  boutique:
    driver: overlay

volumes:
  pgdata:
  prometheusdata:
  grafanadata: 
  lokidata:

configs:
  my_nginx_cfg:
    file: ./nginx/nginx.conf