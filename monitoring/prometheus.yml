global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml


scrape_configs:

  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:9090']

  - job_name: 'productcatalogservice'
    static_configs:
      - targets: ['productcatalogservice:9090']

  - job_name: 'checkoutservice'
    static_configs:
      - targets: ['checkoutservice:9090']

  - job_name: 'authservice'
    static_configs:
      - targets: ['authservice:9090']

  - job_name: 'cartservice'
    static_configs:
      - targets: ['cartservice:9091']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
  